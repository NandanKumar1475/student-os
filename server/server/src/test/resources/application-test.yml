spring:
  datasource:
    url: jdbc:h2:mem:studentos_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=YEAR;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false

app:
  jwt:
    secret: testSecretKeyForJwtSigningMustBeAtLeastThirtyTwoBytesLong
    expiration: 86400000
  cors:
    allowed-origins: http://localhost:5173
