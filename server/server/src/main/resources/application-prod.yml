server:
  port: 8080

spring:
  profiles:
    active: prod
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/student_os}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Nandan@123!@#}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationStudentOS2025MakeItLong}
    expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized