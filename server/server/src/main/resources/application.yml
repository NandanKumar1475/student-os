server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:h2:mem:studentos;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:sa}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
    show-sql: true

app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationStudentOS2025MakeItLong}
    expiration: 86400000

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
