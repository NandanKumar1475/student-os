services:
  - type: web
    name: studentos-backend
    runtime: docker
    dockerfilePath: ./server/server/Dockerfile
    dockerContext: ./server/server
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://studentos-frontend.onrender.com,http://localhost:5173

  - type: web
    name: studentos-frontend
    runtime: static
    buildCommand: cd client && npm ci && npm run build
    staticPublishPath: ./client/dist
    previews:
      generation: automatic
    envVars:
      - key: NODE_VERSION
        value: 22.21.0
      - key: VITE_API_URL
        value: https://studentos-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
