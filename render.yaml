services:
  - type: web
    name: studentos-backend
    runtime: docker
    dockerfilePath: ./server/server/Dockerfile
    dockerContext: ./server/server
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m -Djava.net.preferIPv4Stack=true
      - key: DB_HOST
        fromDatabase:
          name: studentos-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: studentos-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: studentos-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: studentos-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: studentos-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://studentos-frontend.onrender.com,http://localhost:5173

  - type: web
    name: studentos-frontend
    runtime: static
    buildCommand: cd client && npm ci && npm run build
    staticPublishPath: ./client/dist
    previews:
      generation: automatic
    envVars:
      - key: NODE_VERSION
        value: 22.21.0
      - key: VITE_API_URL
        value: https://studentos-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: studentos-db
    plan: free
    databaseName: student_os
    user: student_os_user
