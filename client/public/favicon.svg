<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#071020"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="8" y1="20" x2="56" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7be2ff"/>
      <stop offset="100%" stop-color="#ffbd7d"/>
    </linearGradient>
    <linearGradient id="capSide" x1="8" y1="28" x2="56" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5ccde8"/>
      <stop offset="100%" stop-color="#e8a05a"/>
    </linearGradient>
    <radialGradient id="glowRad" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#7be2ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7be2ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Soft glow behind icon -->
  <ellipse cx="32" cy="34" rx="26" ry="22" fill="url(#glowRad)"/>

  <!-- ── Graduation cap board (top diamond) ── -->
  <polygon points="32,12  55,23  32,34  9,23" fill="url(#capGrad)" opacity="0.97"/>

  <!-- Cap board highlight sheen -->
  <polygon points="32,12  55,23  43.5,28.5  20.5,17.5" fill="white" opacity="0.10"/>

  <!-- ── Cap body sides ── -->
  <!-- Left face -->
  <path d="M13,25.5 L13,38 Q13,41.5 16.5,43 L32,50 L32,37 Z"
        fill="url(#capSide)" opacity="0.75"/>
  <!-- Right face -->
  <path d="M51,25.5 L51,38 Q51,41.5 47.5,43 L32,50 L32,37 Z"
        fill="url(#capSide)" opacity="0.55"/>

  <!-- ── Tassel cord ── -->
  <line x1="55" y1="23" x2="55" y2="36" stroke="#ffbd7d" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel knot -->
  <circle cx="55" cy="37.5" r="2.2" fill="#ffbd7d"/>
  <!-- Tassel threads -->
  <line x1="53.2" y1="39.5" x2="52"   y2="46" stroke="#ffbd7d" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>
  <line x1="55"   y1="39.7" x2="55"   y2="47" stroke="#ffbd7d" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>
  <line x1="56.8" y1="39.5" x2="58"   y2="46" stroke="#ffbd7d" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>

  <!-- ── Spark accent — top-left corner ── -->
  <!-- Outer glow ring -->
  <circle cx="14" cy="13" r="5.5" fill="#7be2ff" opacity="0.15"/>
  <!-- Inner dot -->
  <circle cx="14" cy="13" r="3"   fill="#7be2ff" opacity="0.95"/>
  <!-- Ray lines -->
  <line x1="14"   y1="7.5" x2="14"   y2="5.5"  stroke="#7be2ff" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
  <line x1="19.5" y1="13"  x2="21.5" y2="13"   stroke="#7be2ff" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
  <line x1="17.9" y1="9.1" x2="19.5" y2="7.5"  stroke="#7be2ff" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="17.9" y1="16.9" x2="19.5" y2="18.5" stroke="#7be2ff" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="8.5"  y1="13"  x2="6.5"  y2="13"   stroke="#7be2ff" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
  <line x1="10.1" y1="9.1" x2="8.5"  y2="7.5"  stroke="#7be2ff" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
</svg>
