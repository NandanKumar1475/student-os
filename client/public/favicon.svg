<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="capTop" x1="4" y1="6" x2="60" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7be2ff"/>
      <stop offset="100%" stop-color="#ffbd7d"/>
    </linearGradient>
    <linearGradient id="capFace" x1="4" y1="22" x2="60" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#52c8e0"/>
      <stop offset="100%" stop-color="#e09a52"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Graduation cap board ── -->
  <polygon points="32,5  61,20  32,35  3,20" fill="url(#capTop)" filter="url(#glow)"/>

  <!-- Board highlight sheen -->
  <polygon points="32,5  61,20  46.5,27.5  17.5,12.5" fill="white" opacity="0.14"/>

  <!-- ── Cap body — left face ── -->
  <path d="M7,22.5 L7,39 Q7,44.5 12.5,47 L32,57 L32,40 Z"
        fill="url(#capFace)" opacity="0.85"/>

  <!-- ── Cap body — right face ── -->
  <path d="M57,22.5 L57,39 Q57,44.5 51.5,47 L32,57 L32,40 Z"
        fill="url(#capFace)" opacity="0.60"/>

  <!-- Bottom rim highlight -->
  <path d="M12.5,47 Q22,52.5 32,57 Q42,52.5 51.5,47"
        stroke="white" stroke-width="0.7" stroke-opacity="0.16" fill="none"/>

  <!-- ── Tassel cord ── -->
  <line x1="61" y1="20" x2="61" y2="35" stroke="#ffd080" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Tassel knot -->
  <circle cx="61" cy="36.5" r="2.8" fill="#ffbd7d" filter="url(#glow)"/>
  <!-- Tassel threads -->
  <line x1="58.6" y1="39"   x2="57"   y2="48" stroke="#ffbd7d" stroke-width="1.7" stroke-linecap="round" opacity="0.9"/>
  <line x1="61"   y1="39.3" x2="61"   y2="49" stroke="#ffbd7d" stroke-width="1.7" stroke-linecap="round" opacity="0.9"/>
  <line x1="63.4" y1="39"   x2="65"   y2="48" stroke="#ffbd7d" stroke-width="1.7" stroke-linecap="round" opacity="0.9"/>

  <!-- ── Spark — top-left ── -->
  <circle cx="10" cy="9" r="6.5" fill="#7be2ff" opacity="0.13"/>
  <circle cx="10" cy="9" r="3.4" fill="#7be2ff" opacity="0.97" filter="url(#glow)"/>
  <!-- Cardinal rays -->
  <line x1="10" y1="3.5"  x2="10" y2="1.5"  stroke="#7be2ff" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <line x1="16" y1="9"    x2="18" y2="9"    stroke="#7be2ff" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <line x1="4"  y1="9"    x2="2"  y2="9"    stroke="#7be2ff" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <line x1="10" y1="14.5" x2="10" y2="16.5" stroke="#7be2ff" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <!-- Diagonal rays -->
  <line x1="14.5" y1="4.5"  x2="16"   y2="3"    stroke="#7be2ff" stroke-width="1.2" stroke-linecap="round" opacity="0.48"/>
  <line x1="5.5"  y1="4.5"  x2="4"    y2="3"    stroke="#7be2ff" stroke-width="1.2" stroke-linecap="round" opacity="0.48"/>
  <line x1="14.5" y1="13.5" x2="16"   y2="15"   stroke="#7be2ff" stroke-width="1.2" stroke-linecap="round" opacity="0.48"/>
  <line x1="5.5"  y1="13.5" x2="4"    y2="15"   stroke="#7be2ff" stroke-width="1.2" stroke-linecap="round" opacity="0.48"/>
</svg>
